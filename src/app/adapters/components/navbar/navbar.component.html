<nav class="bg-slate-800 text-white p-4 flex justify-between items-center shadow-md relative z-40">
  <a routerLink="/admin/dashboard"
     class="font-black text-xl tracking-widest uppercase italic hover:text-orange-400 transition-colors cursor-pointer">
    CAFETERÍA {{ userRole === 'ADMIN' ? 'ADMIN' : '' }}
  </a>

  <div class="flex items-center gap-6">
    <ng-container *ngIf="authService.isLoggedIn()">
      <div *ngIf="userRole === 'ADMIN'" class="flex items-center gap-6">

        <div class="relative">
          <button (click)="toggleDropdown($event)"
                  class="hover:text-orange-400 font-bold flex items-center gap-1 transition-colors uppercase text-sm">
            Productos
            <i class="fas text-[10px] transition-transform"
               [ngClass]="isDropdownOpen ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
          </button>

          <div *ngIf="isDropdownOpen"
               class="absolute top-full left-0 w-48 bg-white text-slate-800 shadow-xl rounded-xl py-2 mt-2 border border-slate-100 animate-in fade-in slide-in-from-top-2">
            <button *ngFor="let cat of categories"
                    (click)="selectCategory(cat.translations[0].name)"
                    class="w-full text-left block px-4 py-2 text-xs font-bold hover:bg-slate-50 uppercase border-b border-slate-50 last:border-0">
              {{ cat.translations[0].name }}
            </button>
          </div>
        </div>

        <a routerLink="/admin/categorias" routerLinkActive="text-orange-400" class="hover:text-orange-400 font-bold text-sm transition-colors uppercase">Categorías</a>
        <a routerLink="/admin/mozos" routerLinkActive="text-orange-400" class="hover:text-orange-400 font-bold text-sm transition-colors uppercase">Mozos</a>
      </div>

      <button (click)="openLogoutModal()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-bold shadow-md transition-all text-sm uppercase">
        Salir
      </button>
    </ng-container>
  </div>
</nav>

<div *ngIf="showLogoutModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" (click)="cancelLogout()"></div>
  <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 relative z-10 border-t-4 border-red-500 text-center">
    <div class="bg-red-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
      <i class="fas fa-sign-out-alt text-red-600 text-2xl"></i>
    </div>
    <h3 class="text-xl font-black text-slate-800 mb-2">¿Cerrar Sesión?</h3>
    <p class="text-slate-500 mb-6">Tendrás que volver a ingresar para acceder al sistema.</p>
    <div class="flex gap-3">
      <button (click)="cancelLogout()" class="flex-1 px-4 py-3 bg-slate-100 rounded-xl font-bold">Cancelar</button>
      <button (click)="confirmLogout()" class="flex-1 px-4 py-3 bg-red-500 text-white rounded-xl font-bold shadow-lg shadow-red-200">Sí, Salir</button>
    </div>
  </div>
</div>
