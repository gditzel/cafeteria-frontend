<div class="flex items-center justify-center bg-slate-900 px-4 h-[calc(100vh-80px)]">
  <div class="max-w-md w-full bg-slate-800 rounded-[2.5rem] shadow-2xl p-10 border border-slate-700 transform -translate-y-8">
    <div class="text-center mb-10">
      <div class="bg-orange-500 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-4 rotate-3 shadow-lg shadow-orange-500/20">
        <i class="fas fa-coffee text-white text-3xl"></i>
      </div>
      <h2 class="text-3xl font-black text-white tracking-tighter italic">CAFETERÍA</h2>
      <p class="text-slate-400 mt-2 font-bold uppercase text-[10px] tracking-[0.2em]">Ingreso al Sistema</p>
    </div>

    <div *ngIf="errorMessage" class="mb-6 p-4 bg-rose-500/10 border border-rose-500/20 rounded-2xl text-rose-500 text-sm font-bold text-center italic">
      {{ errorMessage }}
    </div>

    <form class="space-y-6" (submit)="onLogin($event)">
      <div>
        <label class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-widest px-1">Usuario</label>
        <input type="text" placeholder="Ingresa tu nombre de usuario"
               class="w-full p-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:ring-2 focus:ring-orange-500 transition-all placeholder:text-slate-600 font-bold">
      </div>

      <button type="submit"
              class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-5 rounded-2xl shadow-xl shadow-orange-900/20 transition-all active:scale-95 text-lg uppercase italic tracking-tighter">
        Entrar
      </button>
    </form>
  </div>
</div>
