<div class="container mx-auto p-4 max-w-4xl">
  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="bg-white shadow-2xl rounded-[2rem] overflow-hidden border border-slate-100">

    <div class="p-6 border-b border-slate-50 bg-slate-800">
      <h2 class="text-xl font-black text-white italic uppercase tracking-tighter text-center">
        {{ isEditMode ? 'Editar Producto #' + productId : 'Nuevo Producto' }}
      </h2>
    </div>

    <div class="p-6 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

        <div class="relative">
          <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Categoría</label>
          <div class="relative group">
            <select formControlName="categoryId"
                    class="appearance-none w-full bg-slate-50 border-2 border-transparent rounded-xl p-3 text-sm font-bold text-slate-700 outline-none transition-all focus:border-orange-500 cursor-pointer pr-10">
              <option [ngValue]="null">Seleccionar...</option>
              <option *ngFor="let cat of categories" [ngValue]="cat.id">
                {{ cat.translations[0].name }}
              </option>
            </select>
            <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400 group-hover:text-orange-500 transition-colors">
              <i class="fas fa-chevron-down text-[10px]"></i>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Precio ($)</label>
          <input formControlName="price" type="number"
                 class="w-full bg-slate-50 border-2 border-transparent rounded-xl p-3 text-sm font-bold text-slate-700 outline-none transition-all focus:border-orange-500">
        </div>
        <div>
          <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Stock Inicial</label>
          <input formControlName="stock" type="number"
                 class="w-full bg-slate-50 border-2 border-transparent rounded-xl p-3 text-sm font-bold text-slate-700 outline-none transition-all focus:border-orange-500">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-3 p-5 bg-orange-50/30 rounded-2xl border border-orange-100">
          <h3 class="font-black text-orange-500 italic uppercase text-xs">Español</h3>
          <input formControlName="nameEs" type="text" placeholder="Nombre"
                 class="w-full bg-white border-2 border-transparent rounded-xl p-2.5 text-sm font-bold text-slate-700 shadow-sm outline-none focus:border-orange-200">
          <textarea formControlName="descEs" placeholder="Descripción"
                    class="w-full bg-white border-2 border-transparent rounded-xl p-2.5 text-sm font-bold text-slate-700 shadow-sm h-20 resize-none outline-none focus:border-orange-200"></textarea>
        </div>

        <div class="space-y-3 p-5 bg-blue-50/30 rounded-2xl border border-blue-100">
          <h3 class="font-black text-blue-500 italic uppercase text-xs">Inglés</h3>
          <input formControlName="nameEn" type="text" placeholder="Name"
                 class="w-full bg-white border-2 border-transparent rounded-xl p-2.5 text-sm font-bold text-slate-700 shadow-sm outline-none focus:border-blue-200">
          <textarea formControlName="descEn" placeholder="Description"
                    class="w-full bg-white border-2 border-transparent rounded-xl p-2.5 text-sm font-bold text-slate-700 shadow-sm h-20 resize-none outline-none focus:border-blue-200"></textarea>
        </div>
      </div>

      <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100">
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Imagen del Producto</label>
        <div class="flex items-center gap-4">
          <div class="h-24 w-24 rounded-2xl overflow-hidden bg-white border-2 border-white shadow-md flex-shrink-0">
            <img #imgPreview
                 [src]="imagePreview || 'assets/img/no-image.png'"
                 (error)="imgPreview.src='https://placehold.co/200x200?text=Subir+Imagen'; imgPreview.onerror=null"
                 class="h-full w-full object-cover">
          </div>
          <div class="flex-1">
            <input type="file" (change)="onFileSelected($event)"
                   class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-orange-100 file:text-orange-700 hover:file:bg-orange-200">
            <p class="text-[9px] text-slate-400 mt-2 uppercase font-bold">JPG, PNG. Máx 5MB.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="p-6 bg-slate-50 border-t border-slate-100 flex gap-4">
      <button type="button" (click)="onCancel()"
              class="flex-1 bg-white border border-slate-200 text-slate-400 font-black py-4 rounded-2xl shadow-sm uppercase text-xs tracking-widest hover:bg-slate-100 transition-all">
        Cancelar
      </button>

      <button type="submit"
              [disabled]="productForm.invalid || loading"
              class="flex-1 bg-orange-500 hover:bg-orange-600 disabled:bg-slate-300 text-white font-black py-4 rounded-2xl shadow-lg shadow-orange-200 transition-all active:scale-[0.98] uppercase text-xs tracking-widest">
        <span *ngIf="!loading">{{ isEditMode ? 'Actualizar' : 'Crear Producto' }}</span>
        <span *ngIf="loading" class="flex items-center justify-center gap-2">
          <i class="fas fa-spinner fa-spin"></i> PROCESANDO...
        </span>
      </button>
    </div>
  </form>
</div>
