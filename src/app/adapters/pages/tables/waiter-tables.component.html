<div class="min-h-screen bg-slate-900 text-white p-6">
  <div class="mb-8 flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-black italic tracking-tighter uppercase">Mesas</h1>
      <p class="text-orange-500 text-xs font-bold uppercase tracking-widest italic">Seleccioná una para abrir pedido</p>
    </div>
    <div class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center border border-slate-700">
      <i class="fas fa-user text-slate-400"></i>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-4">
    <button *ngFor="let mesa of tables"
            (click)="selectMesa(mesa)"
            class="aspect-square bg-slate-800/50 border-2 border-slate-700 rounded-[2.5rem] flex flex-col items-center justify-center active:scale-95 transition-all group">
      <span class="text-slate-500 font-bold text-[10px] uppercase tracking-widest mb-1">Mesa</span>
      <span class="text-white font-black text-6xl group-active:text-orange-500">{{ mesa.number }}</span>
      <span class="mt-2 px-3 py-1 rounded-full text-[10px] font-black tracking-tighter"
            [ngClass]="mesa.status === 'FREE' ? 'text-emerald-500 bg-emerald-500/10' : 'text-orange-500 bg-orange-500/10'">
        {{ mesa.status === 'FREE' ? 'LIBRE' : 'OCUPADA' }}
      </span>
    </button>
  </div>
</div>
