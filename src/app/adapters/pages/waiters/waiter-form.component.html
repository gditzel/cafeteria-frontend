<div class="flex items-start justify-center px-4 pt-10 pb-10">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">

    <div class="bg-slate-800 p-5 text-center">
      <h2 class="text-xl font-black text-white uppercase italic tracking-tighter">
        {{ isEdit ? 'EDITAR MOZO' : 'NUEVO MOZO' }}
      </h2>
      <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Datos del personal</p>
    </div>

    <form #waiterForm="ngForm" (submit)="waiterForm.valid && onSubmit()" class="p-6 space-y-4">

      <div>
        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Nombre de Usuario</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
            <i class="fas fa-user text-xs"></i>
          </span>
          <input type="text" name="username" [(ngModel)]="user.username" #usernameField="ngModel" required
                 class="w-full pl-10 p-2.5 bg-slate-50 border rounded-xl text-sm outline-none transition-all focus:border-orange-500"
                 [class.border-red-500]="usernameField.invalid && usernameField.touched"
                 [class.border-slate-200]="!usernameField.invalid || !usernameField.touched"
                 placeholder="Ej: gonza_mozo">
        </div>
      </div>

      <div>
        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Correo Electrónico</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
            <i class="fas fa-envelope text-xs"></i>
          </span>
          <input type="email" name="email" [(ngModel)]="user.email" #emailField="ngModel"
                 required
                 pattern="^[a-z0-9._%+-]+&#64;[a-z0-9.-]+\.[a-z]{2,4}$"
                 class="w-full pl-10 p-2.5 bg-slate-50 border rounded-xl text-sm outline-none transition-all focus:border-orange-500"
                 [class.border-red-500]="emailField.invalid && emailField.touched"
                 [class.border-slate-200]="!emailField.invalid || !emailField.touched"
                 placeholder="correo&#64;ejemplo.com">
        </div>
      </div>

      <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
        <div>
          <span class="block text-xs font-black text-slate-700 uppercase">Estado</span>
          <span class="text-[10px] font-bold" [ngClass]="user.isActive ? 'text-emerald-500' : 'text-slate-400'">
            {{ user.isActive ? 'ACTIVO' : 'INACTIVO' }}
          </span>
        </div>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" name="isActive" [(ngModel)]="user.isActive" class="sr-only peer">
          <div class="w-10 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
        </label>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="button" routerLink="/admin/mozos"
                class="flex-1 py-3 px-4 bg-slate-100 hover:bg-slate-200 text-slate-500 text-xs font-black uppercase tracking-widest rounded-xl transition-colors">
          Cancelar
        </button>
        <button type="submit" [disabled]="waiterForm.invalid"
                class="flex-1 py-3 px-4 bg-orange-600 hover:bg-orange-700 disabled:bg-slate-200 text-white text-xs font-black uppercase tracking-widest rounded-xl shadow-lg shadow-orange-100 transition-all active:scale-95">
          {{ isEdit ? 'Guardar' : 'Crear' }}
        </button>
      </div>
    </form>
  </div>
</div>
