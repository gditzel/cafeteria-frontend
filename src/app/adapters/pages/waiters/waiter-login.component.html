<div class="min-h-screen flex flex-col items-center justify-center bg-slate-900 px-6 py-12">
  <div class="bg-orange-500 w-20 h-20 rounded-2xl flex items-center justify-center shadow-xl shadow-orange-500/20 mb-6">
    <i class="fas fa-hand-holding-heart text-white text-3xl"></i>
  </div>

  <div class="text-center mb-10">
    <h1 class="text-3xl font-black text-white tracking-tight">ACCESO MOZOS</h1>
    <p class="text-slate-400 text-sm mt-2 font-medium">Ingresá tu usuario para comenzar</p>
  </div>

  <div class="w-full max-w-xs space-y-4">
    <div class="relative">
      <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
        <i class="fas fa-id-badge text-xl"></i>
      </span>
      <input type="text" [(ngModel)]="username"
             class="w-full pl-12 p-4 bg-slate-800 border-2 border-slate-700 rounded-2xl text-white font-bold text-lg outline-none focus:border-orange-500 transition-all placeholder:text-slate-600"
             placeholder="Usuario (ej: gonza_mozo)">
    </div>

    <button (click)="onLogin()"
            [disabled]="!username"
            class="w-full py-4 bg-orange-500 hover:bg-orange-600 disabled:bg-slate-700 text-white font-black text-lg rounded-2xl shadow-lg active:scale-95 transition-all">
      INICIAR TURNO
    </button>
  </div>

  <div *ngIf="errorMessage" class="fixed bottom-10 left-6 right-6 bg-red-500 text-white p-4 rounded-xl text-center font-bold shadow-2xl animate-bounce">
    <i class="fas fa-exclamation-circle mr-2"></i> {{ errorMessage }}
  </div>
</div>
