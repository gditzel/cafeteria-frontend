<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6">
  <div class="w-full max-w-md bg-white shadow-xl rounded-2xl border border-gray-100 overflow-hidden">
    <div class="h-1.5 bg-orange-500"></div>
    <div class="p-8">
      <h1 class="text-2xl font-extrabold text-orange-600 text-center uppercase tracking-tight">
        Cafetería
      </h1>
      <p class="text-center text-gray-500 text-sm mt-1 mb-6">Ingreso de personal</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-gray-700 font-bold mb-1" for="username">Usuario</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            autocomplete="username"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none"
            placeholder="Nombre de usuario"
          />
        </div>

        @if (errorMessage) {
          <p class="text-sm text-red-600">{{ errorMessage }}</p>
        }

        <button
          type="submit"
          [disabled]="loading || form.invalid"
          class="w-full py-3 bg-orange-600 text-white font-bold rounded-lg hover:bg-orange-700 transition duration-300 shadow-md disabled:opacity-50"
        >
          {{ loading ? 'Ingresando...' : 'Entrar' }}
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-400">
        <a routerLink="/dashboard" class="text-orange-600 hover:underline">Ir al panel de productos</a>
      </p>
    </div>
  </div>
</div>
