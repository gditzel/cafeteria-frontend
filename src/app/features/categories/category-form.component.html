<div class="p-6 sm:p-8">
  <h2 class="text-xl font-bold text-gray-900 mb-1">Nueva categoría</h2>
  <p class="text-gray-500 mb-6">Nombre visible en el menú en cada idioma.</p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-700 font-bold mb-1" for="cat-es">Nombre (Español)</label>
        <input
          id="cat-es"
          type="text"
          formControlName="nameEs"
          class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none"
          placeholder="Ej. Bebidas"
        />
      </div>
      <div>
        <label class="block text-gray-700 font-bold mb-1" for="cat-en">Nombre (Inglés)</label>
        <input
          id="cat-en"
          type="text"
          formControlName="nameEn"
          class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none"
          placeholder="E.g. Drinks"
        />
      </div>
    </div>

    <label class="flex items-center gap-3 text-gray-700 cursor-pointer select-none">
      <input
        type="checkbox"
        formControlName="isActive"
        class="rounded border-gray-300 text-orange-600 focus:ring-orange-500 w-4 h-4"
      />
      <span class="font-medium">Categoría activa (aparece al cargar productos)</span>
    </label>

    <button
      type="submit"
      [disabled]="loading || form.invalid"
      class="w-full py-3 bg-orange-600 text-white font-bold rounded-lg hover:bg-orange-700 transition duration-300 shadow-md disabled:opacity-50"
    >
      {{ loading ? 'Guardando…' : 'Guardar categoría' }}
    </button>
  </form>
</div>
