<div class="max-w-2xl mx-auto p-6 bg-white rounded-xl shadow-lg border-t-4 border-orange-600">
  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-4">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-700 font-bold mb-1">Nombre (Español)</label>
        <input type="text" formControlName="nameEs" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">

        <label class="block text-gray-700 font-bold mt-3 mb-1">Descripción (Español)</label>
        <textarea formControlName="descriptionEs" rows="2" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none"></textarea>
      </div>

      <div>
        <label class="block text-gray-700 font-bold mb-1">Nombre (Inglés)</label>
        <input type="text" formControlName="nameEn" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">

        <label class="block text-gray-700 font-bold mt-3 mb-1">Descripción (Inglés)</label>
        <textarea formControlName="descriptionEn" rows="2" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none"></textarea>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-700 font-bold mb-1">Precio</label>
        <input type="number" formControlName="price" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
      </div>
      <div>
        <label class="block text-gray-700 font-bold mb-1">Stock</label>
        <input type="number" formControlName="stock" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
      </div>
    </div>

    <div class="p-4 bg-orange-50 rounded-lg border border-orange-100">
      <label class="block text-gray-700 font-bold mb-2">Imagen del Producto</label>
      <input type="file" (change)="onFileSelected($event)" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-600 file:text-white hover:file:bg-orange-700">
    </div>

    <button type="submit" [disabled]="loading" class="w-full py-3 bg-orange-600 text-white font-bold rounded-lg hover:bg-orange-700 transition duration-300 shadow-md">
      {{ loading ? 'Guardando...' : 'Guardar Producto' }}
    </button>
  </form>
</div>
