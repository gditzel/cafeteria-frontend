<div class="container mx-auto p-6 max-w-4xl">
  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="bg-white shadow-2xl rounded-[2rem] overflow-hidden border border-slate-100">

    <div class="p-8 border-b border-slate-50 bg-slate-50/50">
      <h2 class="text-2xl font-black text-slate-800 italic uppercase tracking-tighter">
        {{ isEditMode ? 'Editar Producto #' + productId : 'Nuevo Producto' }}
      </h2>
    </div>

    <div class="p-8 space-y-8">
      <div>
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Categoría</label>
        <select formControlName="categoryId" class="w-full bg-slate-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-orange-500">
          <option [ngValue]="null">Seleccionar categoría</option>
          <option *ngFor="let cat of categories" [ngValue]="cat.id">
            {{ cat.translations[0].name }}
          </option>
        </select>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="space-y-4 p-6 bg-orange-50/30 rounded-2xl border border-orange-100">
          <h3 class="font-black text-orange-500 italic uppercase text-sm">Español</h3>
          <input formControlName="nameEs" type="text" placeholder="Nombre" class="w-full bg-white border-none rounded-xl p-3 shadow-sm">
          <textarea formControlName="descEs" placeholder="Descripción" class="w-full bg-white border-none rounded-xl p-3 shadow-sm h-24"></textarea>
        </div>

        <div class="space-y-4 p-6 bg-blue-50/30 rounded-2xl border border-blue-100">
          <h3 class="font-black text-blue-500 italic uppercase text-sm">Inglés</h3>
          <input formControlName="nameEn" type="text" placeholder="Name" class="w-full bg-white border-none rounded-xl p-3 shadow-sm">
          <textarea formControlName="descEn" placeholder="Description" class="w-full bg-white border-none rounded-xl p-3 shadow-sm h-24"></textarea>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-8">
        <div>
          <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Precio ($)</label>
          <input formControlName="price" type="number" class="w-full bg-slate-50 border-none rounded-xl p-4">
        </div>
        <div>
          <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Stock Inicial</label>
          <input formControlName="stock" type="number" class="w-full bg-slate-50 border-none rounded-xl p-4">
        </div>
      </div>

      <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100">
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Imagen del Producto</label>

        <div class="flex items-center gap-6">
          <div class="h-32 w-32 rounded-2xl overflow-hidden bg-white border-4 border-white shadow-md">
            <img #imgPreview
                 [src]="imagePreview || 'assets/img/no-image.png'"
                 (error)="imgPreview.src='https://placehold.co/200x200?text=Sin+Imagen'; imgPreview.onerror=null"
                 class="h-full w-full object-cover">
          </div>

          <div class="flex-1">
            <input type="file" (change)="onFileSelected($event)" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:bg-orange-100 file:text-orange-700 hover:file:bg-orange-200">
            <p class="text-[10px] text-slate-400 mt-2 uppercase font-bold">Formatos aceptados: JPG, PNG. Máx 5MB.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="p-8 bg-slate-50 border-t border-slate-100">
      <button type="submit"
              [disabled]="productForm.invalid || loading"
              class="w-full bg-orange-500 hover:bg-orange-600 disabled:bg-slate-300 text-white font-black py-4 rounded-2xl shadow-lg shadow-orange-200 transition-all active:scale-[0.98]">
        <span *ngIf="!loading">{{ isEditMode ? 'ACTUALIZAR PRODUCTO' : 'CREAR PRODUCTO' }}</span>
        <span *ngIf="loading" class="flex items-center justify-center gap-2">
          <i class="fas fa-spinner fa-spin"></i> PROCESANDO...
        </span>
      </button>
    </div>
  </form>
</div>
