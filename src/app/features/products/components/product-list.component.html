<div class="container mx-auto p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-black text-slate-800 tracking-tight uppercase italic">Gestión de Cafetería</h2>
    <button (click)="openAddModal()" class="bg-orange-500 hover:bg-orange-600 text-white font-black py-3 px-8 rounded-xl shadow-lg transition-transform active:scale-95">
      + NUEVO PRODUCTO
    </button>
  </div>

  <div class="bg-white shadow-2xl rounded-2xl overflow-hidden border border-slate-100">
    <table class="min-w-full divide-y divide-slate-100">
      <thead class="bg-slate-50/50">
      <tr>
        <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Imagen</th>
        <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Nombre</th>
        <th class="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Precio</th>
        <th class="px-6 py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Estado</th>
        <th class="px-6 py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Acciones</th>
      </tr>
      </thead>
      <tbody class="bg-white divide-y divide-slate-50">
      <tr *ngFor="let p of products; let first = first; let last = last"
          class="hover:bg-slate-50 transition-colors"
          [ngClass]="{'opacity-50 grayscale': !p.isActive}">

        <td class="px-6 py-4">
          <img #img
               [src]="'http://localhost:8080/api/products/' + p.id + '/image?t=' + p.id"
               class="h-16 w-16 rounded-lg object-cover border-2 border-white shadow-sm"
               (error)="handleImageError(img)">
        </td>

        <td class="px-6 py-4 text-sm font-bold text-slate-700">{{ getNameEs(p) }}</td>
        <td class="px-6 py-4 text-sm font-black text-emerald-600">${{ p.price }}</td>

        <td class="px-6 py-4 text-center">
          <button (click)="toggleProductStatus(p)"
                  class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-300"
                  [ngClass]="p.isActive ? 'bg-orange-500' : 'bg-slate-200'">
                  <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-300"
                        [ngClass]="p.isActive ? 'translate-x-6' : 'translate-x-1'"></span>
          </button>
        </td>

        <td class="px-6 py-4">
          <div class="flex justify-center items-center gap-2">
            <div class="flex bg-slate-100 rounded-lg p-1 border border-slate-200">
              <button (click)="moveUp(p)" [disabled]="first" class="p-1 text-slate-400 hover:text-orange-500 disabled:opacity-20 transition-all">
                <i class="fas fa-chevron-up"></i>
              </button>
              <button (click)="moveDown(p)" [disabled]="last" class="p-1 text-slate-400 hover:text-orange-500 disabled:opacity-20 transition-all">
                <i class="fas fa-chevron-down"></i>
              </button>
            </div>

            <button (click)="editProduct(p.id)" class="w-10 h-10 flex items-center justify-center bg-blue-50 text-blue-500 rounded-lg hover:bg-blue-500 hover:text-white transition-all">
              <i class="fas fa-edit"></i>
            </button>

            <button (click)="triggerDelete(p)" class="w-10 h-10 flex items-center justify-center bg-rose-50 text-rose-500 rounded-lg hover:bg-rose-500 hover:text-white transition-all">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="showDeleteModal" class="fixed inset-0 z-[999] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
  <div class="bg-white rounded-[2rem] shadow-2xl max-w-sm w-full overflow-hidden border border-slate-100">
    <div class="p-8 text-center">
      <div class="w-20 h-20 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="fas fa-exclamation-triangle text-3xl"></i>
      </div>
      <h3 class="text-xl font-black text-slate-800 uppercase italic tracking-tighter mb-2">¿Estás seguro?</h3>
      <p class="text-slate-500 text-sm font-medium leading-relaxed">
        Vas a eliminar <span class="font-bold text-slate-800">"{{ productToDelete?.name }}"</span>. Esta acción no se puede deshacer.
      </p>
    </div>
    <div class="flex p-4 gap-3 bg-slate-50">
      <button (click)="cancelDelete()" class="flex-1 py-4 text-slate-400 font-black text-xs uppercase tracking-widest hover:bg-slate-100 rounded-2xl transition-colors">
        Cancelar
      </button>
      <button (click)="confirmDelete()" class="flex-1 py-4 bg-rose-500 text-white font-black text-xs uppercase tracking-widest hover:bg-rose-600 rounded-2xl shadow-lg transition-all active:scale-95">
        Eliminar ahora
      </button>
    </div>
  </div>
</div>
