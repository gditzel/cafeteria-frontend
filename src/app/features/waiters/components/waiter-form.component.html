<div class="min-h-[calc(100vh-80px)] flex items-center justify-center bg-slate-100 px-4 py-12">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
    <div class="bg-slate-800 p-6 text-center">
      <h2 class="text-2xl font-black text-white tracking-tight">
        {{ isEdit ? 'EDITAR MOZO' : 'NUEVO MOZO' }}
      </h2>
      <p class="text-slate-400 text-sm mt-1">Completa los datos del personal</p>
    </div>

    <form #waiterForm="ngForm" (submit)="waiterForm.valid && onSubmit()" class="p-8 space-y-6">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Nombre de Usuario</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
            <i class="fas fa-user"></i>
          </span>
          <input type="text" name="username" [(ngModel)]="user.username" #usernameField="ngModel" required
                 class="w-full pl-10 p-3 bg-slate-50 border rounded-xl outline-none transition-all"
                 [class.border-red-500]="usernameField.invalid && usernameField.touched"
                 [class.border-slate-300]="!usernameField.invalid || !usernameField.touched"
                 placeholder="Ej: gonza_mozo">
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Correo Electrónico</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
            <i class="fas fa-envelope"></i>
          </span>
          <input type="email" name="email" [(ngModel)]="user.email" #emailField="ngModel"
                 required
                 pattern="^[a-z0-9._%+-]+&#64;[a-z0-9.-]+\.[a-z]{2,4}$"
                 class="w-full pl-10 p-3 bg-slate-50 border rounded-xl outline-none transition-all"
                 [class.border-red-500]="emailField.invalid && emailField.touched"
                 [class.border-slate-300]="!emailField.invalid || !emailField.touched"
                 placeholder="correo&#64;ejemplo.com">
        </div>
        <div *ngIf="emailField.invalid && emailField.touched" class="text-red-500 text-xs mt-1 font-bold">
          <p *ngIf="emailField.errors?.['required']">El correo es obligatorio.</p>
          <p *ngIf="emailField.errors?.['pattern']">El formato debe ser usuario&#64;dominio.com (ej. .com, .ar)</p>
        </div>
      </div>

      <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-200">
        <div>
          <span class="block text-sm font-bold text-slate-700">Estado de Cuenta</span>
          <span class="text-xs text-slate-500">{{ user.isActive ? 'Activo' : 'Inactivo' }}</span>
        </div>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" name="isActive" [(ngModel)]="user.isActive" class="sr-only peer">
          <div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
        </label>
      </div>

      <div class="flex gap-4 pt-4">
        <button type="button" routerLink="/admin/mozos"
                class="flex-1 py-3 px-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl">
          Cancelar
        </button>
        <button type="submit" [disabled]="waiterForm.invalid"
                class="flex-1 py-3 px-4 bg-orange-600 hover:bg-orange-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold rounded-xl shadow-lg transition-all active:scale-95">
          {{ isEdit ? 'Guardar Cambios' : 'Crear Mozo' }}
        </button>
      </div>
    </form>
  </div>
</div>
