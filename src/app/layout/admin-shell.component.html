<div class="min-h-screen bg-gray-50 flex flex-col">
  <header
    class="sticky top-0 z-20 bg-white/95 backdrop-blur border-b border-gray-200 shadow-sm"
  >
    <div
      class="max-w-5xl mx-auto px-4 sm:px-6 py-3 flex flex-wrap items-center justify-between gap-3"
    >
      <a
        routerLink="/dashboard"
        class="text-lg sm:text-xl font-extrabold text-orange-600 tracking-tight uppercase hover:text-orange-700 transition-colors"
      >
        Cafetería Admin
      </a>

      <nav class="flex flex-wrap items-center gap-1 sm:gap-2" aria-label="Principal">
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-orange-50 text-orange-800 ring-1 ring-orange-200 shadow-sm"
          [routerLinkActiveOptions]="{ exact: true }"
          class="px-3 sm:px-4 py-2 rounded-lg text-sm font-semibold text-gray-600 hover:bg-gray-100 transition-colors"
        >
          Productos
        </a>
        <a
          routerLink="/categories"
          routerLinkActive="bg-orange-50 text-orange-800 ring-1 ring-orange-200 shadow-sm"
          [routerLinkActiveOptions]="{ exact: true }"
          class="px-3 sm:px-4 py-2 rounded-lg text-sm font-semibold text-gray-600 hover:bg-gray-100 transition-colors"
        >
          Categorías
        </a>
        <a
          routerLink="/login"
          class="ml-1 sm:ml-2 px-3 sm:px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-orange-700 hover:bg-orange-50/80 transition-colors"
        >
          Login
        </a>
      </nav>
    </div>
  </header>

  <div class="flex-1 w-full">
    <router-outlet />
  </div>

  <footer class="py-6 text-center text-gray-400 text-sm italic border-t border-gray-100 bg-white/50">
    &copy; 2026 Sistema de Gestión Interna
  </footer>
</div>
